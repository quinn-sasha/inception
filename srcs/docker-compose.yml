services:
  nginx:
    build: ./requirements/nginx/
    depends_on:
     - wordpress
    ports:
      - "443:443"
    networks:
      - wordpress-network
    volumes:
      - website-files:/var/www/html
    restart: on-failure

  wordpress:
    build: ./requirements/wordpress/
    depends_on:
     - database
    networks:
     - wordpress-network
    volumes:
     - website-files:/var/www/html
    restart: on-failure
    env_file:
      - .env
    secrets:
      - db_password
      - wordpress_password
      - wordpress_admin_password

  database:
    build: ./requirements/database/
    networks:
     - wordpress-network
    volumes:
     - mariadb_data:/var/lib/mysql
    restart: on-failure
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password

networks:
  wordpress-network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/squinn/data/mariadb

  website-files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/squinn/data/wordpress

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wordpress_password:
    file: ../secrets/wordpress_password.txt
  wordpress_admin_password:
    file: ../secrets/wordpress_admin_password.txt
